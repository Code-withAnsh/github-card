<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="promises2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body> 
    <div id="search-screen">
        <div id="search-card">
          <div id="search-logo">
            <svg height="40" viewBox="0 0 16 16" width="40" fill="#ffffff">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </div>
          <h1 id="search-title">GitHub Profile Finder</h1>
          <p id="search-sub">Enter a GitHub username to explore their profile</p>
          <div id="search-input-wrap">
            <span id="search-icon">@</span>
            <input type="text" id="user" placeholder="e.g. Code-withAnsh" autocomplete="off"/>
          </div>
          <button id="search-btn">Search Profile</button>
          <p id="search-hint">Try: torvalds · gaearon · sindresorhus</p>
        </div>
      </div>

    <div id="main">
        <div id="main-card">
            <div id="profile-card">
                <div class="top-section">
                    <div class="left"></div>
                    <div class="right">
                        <div id="follow">
                            <div id="followers"></div>
                            <div id="following"></div>
                        </div>
                    </div>
                </div>
                <div class="bio-section"></div>
                <div class="meta-section"></div>
                <div id="line"></div>
                <div class="stats-section">
                    <div id="div1"></div>
                    <div id="div2"></div>
                    <div id="div3"></div>
                </div>
                <div id="line2"></div>
                <div class="topics-section"></div>
                <div class="cta-section"></div>
            </div>
           </div>
    </div>
   

    <script src="promises2.js"></script>
</body>
</html>
